name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Essential System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libsqlite3-dev \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          libffi-dev \
          ccache

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install virtualenv
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Build APK with Buildozer
      run: |
        # Передаем переменную окружения, которая принудительно одобряет все лицензии Android SDK автоматически
        export ANDROID_濃_HOME=$HOME/.buildozer/android/platform/android-sdk
        
        # Запускаем сборку в режиме автоматического согласия
        buildozer android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Geotelo-GIS-Android-APK
        path: bin/*.apk
        if-no-files-found: error
