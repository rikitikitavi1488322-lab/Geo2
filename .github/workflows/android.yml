name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Essential System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libsqlite3-dev \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          libffi-dev \
          ccache

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Ставим заведомо стабильный Cython 0.29.33, который не ругается на cgl_mock.pyx
        pip install "cython==0.29.33" virtualenv
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Build APK with Buildozer
      run: |
        # Отключаем превращение предупреждений Cython и GCC в критические ошибки
        export CFLAGS="-w"
        export ACTION_ENV="WNO_ERROR=1"
        
        # Запуск сборки
        yes | buildozer -v android debug
