name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Используем стандартную стабильную виртуальную машину
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Essential System Dependencies
      run: |
        sudo apt-get update
        # Устанавливаем только базовый набор для компиляции C-расширений Python и Android SDK
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libsqlite3-dev \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          libffi-dev \
          ccache

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Ограничиваем версию Cython для полной совместимости с Kivy 2.3.0
        pip install "cython<3.0.0" virtualenv
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Build APK with Buildozer
      run: |
        # Запуск сборки с автоматическим согласием на лицензии Google
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Geotelo-GIS-Android-APK
        path: bin/*.apk
        if-no-files-found: error
