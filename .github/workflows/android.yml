name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Используем официальный и самый стабильный экшен для сборки Kivy/Buildozer
    - name: Buildozer Action
      uses: ArtemSanya/buildozer-action@v1
      with:
        buildozer_version: master
        # Автоматически подставит нужные параметры команды:
        command: buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Geotelo-GIS-Android-APK
        path: bin/*.apk
